<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shannon Target - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #333;
            font-size: 24px;
        }
        .user-info {
            display: none;
            align-items: center;
            gap: 15px;
        }
        .user-info.active {
            display: flex;
        }
        .user-info span {
            color: #666;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        .btn-danger:hover {
            background: #c53030;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            background: #f7fafc;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .result.success {
            background: #c6f6d5;
            border: 1px solid #68d391;
        }
        .result.error {
            background: #fed7d7;
            border: 1px solid #fc8181;
        }
        .result.info {
            background: #bee3f8;
            border: 1px solid #63b3ed;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e2e8f0;
            color: #4a5568;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
        }
        .dashboard {
            display: none;
        }
        .dashboard.active {
            display: block;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        .grid-2 {
            display: grid;
            grid1fr 1-template-columns: fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection">
            <div class="card login-form">
                <h2>系统登录</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="bypassAuth">
                        <label for="bypassAuth" style="margin: 0;">使用认证绕过</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                </form>
                <div id="loginResult" class="result" style="display: none;"></div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="dashboard">
            <div class="header">
                <h1>Shannon Target 管理后台</h1>
                <div class="user-info active" id="userInfo">
                    <span id="currentUser"></span>
                    <button class="btn btn-danger" onclick="logout()">退出登录</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('network')">网络工具</button>
                <button class="tab-btn" onclick="switchTab('user')">用户管理</button>
                <button class="tab-btn" onclick="switchTab('comment')">评论管理</button>
                <button class="tab-btn" onclick="switchTab('profile')">个人资料</button>
                <button class="tab-btn" onclick="switchTab('fetch')">URL抓取</button>
            </div>

            <!-- Network Tools Tab -->
            <div id="tab-network" class="tab-content active">
                <div class="card">
                    <h2>Ping 测试</h2>
                    <form id="pingForm">
                        <div class="form-group">
                            <label>主机地址</label>
                            <input type="text" id="pingHost" placeholder="例如: 127.0.0.1" value="127.0.0.1">
                        </div>
                        <button type="submit" class="btn btn-primary">执行 Ping</button>
                        <div id="pingResult" class="result" style="display: none;"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>Traceroute 路由追踪</h2>
                    <form id="tracerouteForm">
                        <div class="form-group">
                            <label>目标地址</label>
                            <input type="text" id="tracerouteTarget" placeholder="例如: 8.8.8.8" required>
                        </div>
                        <button type="submit" class="btn btn-primary">开始追踪</button>
                        <div id="tracerouteResult" class="result" style="display: none;"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>DNS 查询</h2>
                    <form id="nslookupForm">
                        <div class="form-group">
                            <label>域名</label>
                            <input type="text" id="nslookupDomain" placeholder="例如: example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary">查询 DNS</button>
                        <div id="nslookupResult" class="result" style="display: none;"></div>
                    </form>
                </div>
            </div>

            <!-- User Management Tab -->
            <div id="tab-user" class="tab-content">
                <div class="card">
                    <h2>用户搜索</h2>
                    <form id="userSearchForm">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="searchUsername" placeholder="输入用户名搜索">
                        </div>
                        <button type="submit" class="btn btn-primary">搜索</button>
                        <div id="userSearchResult" class="result" style="display: none;"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>用户ID查询</h2>
                    <form id="userLookupForm">
                        <div class="form-group">
                            <label>用户ID</label>
                            <input type="text" id="lookupId" placeholder="输入用户ID" value="1">
                        </div>
                        <button type="submit" class="btn btn-primary">查询</button>
                        <div id="userLookupResult" class="result" style="display: none;"></div>
                    </form>
                </div>
            </div>

            <!-- Comment Management Tab -->
            <div id="tab-comment" class="tab-content">
                <div class="card">
                    <h2>发表评论</h2>
                    <form id="commentForm">
                        <div class="form-group">
                            <label>评论内容</label>
                            <textarea id="commentContent" rows="3" placeholder="请输入评论内容" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">提交评论</button>
                        <div id="commentResult" class="result" style="display: none;"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>评论列表</h2>
                    <form id="commentListForm">
                        <div class="form-group">
                            <label>筛选（可选）</label>
                            <input type="text" id="commentFilter" placeholder="输入关键词筛选">
                        </div>
                        <button type="submit" class="btn btn-primary">查看评论</button>
                        <div id="commentListResult" class="result" style="display: none;"></div>
                    </form>
                </div>

                <div class="card">
                    <h2>搜索</h2>
                    <form id="searchForm">
                        <div class="form-group">
                            <label>搜索关键词</label>
                            <input type="text" id="searchQuery" placeholder="输入搜索内容" required>
                        </div>
                        <button type="submit" class="btn btn-primary">搜索</button>
                        <div id="searchResult" class="result" style="display: none;"></div>
                    </form>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content">
                <div class="card">
                    <h2>更新个人资料</h2>
                    <form id="profileForm">
                        <div class="form-group">
                            <label>姓名</label>
                            <input type="text" id="profileName" placeholder="请输入姓名" required>
                        </div>
                        <div class="form-group">
                            <label>个人简介</label>
                            <textarea id="profileBio" rows="4" placeholder="请输入个人简介"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                        <div id="profileResult" class="result" style="display: none;"></div>
                    </form>
                </div>
            </div>

            <!-- URL Fetch Tab -->
            <div id="tab-fetch" class="tab-content">
                <div class="card">
                    <h2>URL 抓取工具</h2>
                    <form id="fetchForm">
                        <div class="form-group">
                            <label>目标 URL</label>
                            <input type="text" id="fetchUrl" placeholder="例如: https://example.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary">抓取</button>
                        <div id="fetchResult" class="result" style="display: none;"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const bypass = document.getElementById('bypassAuth').checked;
            const resultDiv = document.getElementById('loginResult');

            try {
                const options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                };
                if (bypass) {
                    options.headers['X-Admin-Header'] = 'true';
                }

                const params = new URLSearchParams();
                params.append('username', username);
                params.append('password', password);

                const response = await fetch(`${API_BASE}/login?${params}`, options);
                const data = await response.json();

                resultDiv.style.display = 'block';
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                    document.getElementById('currentUser').textContent = data.user || username;
                    setTimeout(() => {
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('dashboardSection').classList.add('active');
                    }, 1000);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').classList.remove('active');
            document.getElementById('loginForm').reset();
            document.getElementById('loginResult').style.display = 'none';
        }

        // Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Network Tools
        document.getElementById('pingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const host = document.getElementById('pingHost').value;
            const resultDiv = document.getElementById('pingResult');

            try {
                const response = await fetch(`${API_BASE}/ping?host=${encodeURIComponent(host)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        document.getElementById('tracerouteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const target = document.getElementById('tracerouteTarget').value;
            const resultDiv = document.getElementById('tracerouteResult');

            try {
                const response = await fetch(`${API_BASE}/traceroute?target=${encodeURIComponent(target)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        document.getElementById('nslookupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const domain = document.getElementById('nslookupDomain').value;
            const resultDiv = document.getElementById('nslookupResult');

            try {
                const response = await fetch(`${API_BASE}/nslookup?domain=${encodeURIComponent(domain)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        // User Management
        document.getElementById('userSearchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('searchUsername').value;
            const resultDiv = document.getElementById('userSearchResult');

            try {
                const response = await fetch(`${API_BASE}/user/search?username=${encodeURIComponent(username)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        document.getElementById('userLookupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('lookupId').value;
            const resultDiv = document.getElementById('userLookupResult');

            try {
                const response = await fetch(`${API_BASE}/user/lookup?id=${encodeURIComponent(id)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        // Comments
        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('commentContent').value;
            const resultDiv = document.getElementById('commentResult');

            try {
                const response = await fetch(`${API_BASE}/comment?content=${encodeURIComponent(content)}`, {
                    method: 'POST'
                });
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
                document.getElementById('commentContent').value = '';
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        document.getElementById('commentListForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const filter = document.getElementById('commentFilter').value;
            const resultDiv = document.getElementById('commentListResult');

            try {
                const url = filter ? `${API_BASE}/comment?filter=${encodeURIComponent(filter)}` : `${API_BASE}/comment`;
                const response = await fetch(url);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchQuery').value;
            const resultDiv = document.getElementById('searchResult');

            try {
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        // Profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('profileName').value;
            const bio = document.getElementById('profileBio').value;
            const resultDiv = document.getElementById('profileResult');

            try {
                const params = new URLSearchParams();
                params.append('name', name);
                params.append('bio', bio);

                const response = await fetch(`${API_BASE}/profile?${params}`, {
                    method: 'POST'
                });
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });

        // URL Fetch
        document.getElementById('fetchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('fetchUrl').value;
            const resultDiv = document.getElementById('fetchResult');

            try {
                const response = await fetch(`${API_BASE}/fetch?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = 'result info';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求失败: ' + error.message;
            }
        });
    </script>
</body>
</html>
